<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIワードウルフ</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-color: #16213e;
            --accent-color: #e94560;
            --text-color: #ecf0f1;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .box {
            background-color: var(--card-color);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hidden { display: none; }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #0f3460;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--accent-color);
            color: white;
            transition: transform 0.1s;
        }
        button:active { transform: translateY(2px); }
        button.secondary { background-color: #95a5a6; }
        button.next-btn { background-color: #4CAF50; margin-top: 20px; font-size: 1.2rem; }
        
        button.copy-btn { background-color: #0f3460; margin-top: 5px; font-size: 0.9rem;}
        button.danger-link {
            background: none;
            color: #666;
            font-size: 0.8rem;
            margin-top: 30px;
            padding: 5px;
            text-decoration: underline;
        }

        #word-card {
            background: linear-gradient(135deg, #0f3460, #16213e);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px dashed var(--accent-color);
        }
        #word-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
        }

        ul { padding: 0; list-style: none; }
        li {
            background: rgba(255,255,255,0.05);
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .role-wolf { color: #ff6b6b; }
        .role-fox { color: #feca57; }
        .role-villager { color: #1dd1a1; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1 class="animate__animated animate__fadeInDown">🦊 AIワードウルフ 🐺</h1>

    <!-- 1. 名前入力 -->
    <div id="login-screen" class="box animate__animated animate__fadeInUp">
        <p>ニックネームを入力して参加</p>
        <input type="text" id="username" placeholder="名前" />
        <button onclick="joinGame()">部屋に入る 🚪</button>
        <div style="text-align: center;">
            <button class="danger-link" onclick="forceReset()">⚠️ ゲームが動かなくなったらリセット</button>
        </div>
    </div>

    <!-- 2. ロビー -->
    <div id="lobby-screen" class="box hidden animate__animated animate__fadeIn">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>⛺ 待機所</h2>
            <span id="player-count" style="font-size:0.8rem; color:#aaa;">0人</span>
        </div>
        <button class="copy-btn" onclick="copyUrl()">🔗 URLをコピー</button>
        <ul id="players-ul"></ul>
        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <label style="font-size: 0.9rem;">お題のジャンル</label>
            <select id="difficulty">
                <option value="easy">🐣 かんたん（子供向け）</option>
                <option value="normal" selected>🙂 ふつう（一般）</option>
                <option value="hard">😈 むずかしい（抽象的）</option>
                <option value="sexy">🔞 セクシー（大人限定）</option>
            </select>
            <button onclick="startGame()">ゲーム開始 🎮</button>
        </div>
    </div>

    <!-- 3. ゲーム画面 -->
    <div id="game-screen" class="box hidden animate__animated animate__zoomIn">
        <h2>あなたのお題</h2>
        <p class="pulse" style="font-size: 0.9rem; color: #aaa;">会話中...</p>
        <div id="word-card"><div id="word-display">???</div></div>
        <button class="secondary" onclick="socket.emit('start_voting')">✋ 投票へ進む</button>
    </div>

    <!-- 4. 投票画面 -->
    <div id="vote-screen" class="box hidden animate__animated animate__fadeInRight">
        <h2>👉 追放投票</h2>
        <div id="vote-buttons"></div>
    </div>
    
    <!-- 5. 待機画面 -->
    <div id="wait-vote-screen" class="box hidden animate__animated animate__fadeIn">
        <h2>🙏 祈り中...</h2>
        <div style="font-size: 3rem; margin: 20px;">⌛</div>
    </div>

    <!-- 6. 結果画面 -->
    <div id="result-screen" class="box hidden animate__animated animate__backInUp">
        <h2>🏆 結果発表</h2>
        <ul id="result-list"></ul>
        
        <!-- ここに手動リセットボタンを追加 -->
        <button class="next-btn" onclick="nextGame()">🔄 次のゲームへ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const icons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷'];

        function showScreen(screenId) {
            document.querySelectorAll('.box').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(screenId);
            target.classList.remove('hidden');
            target.classList.remove('animate__animated');
            void target.offsetWidth;
            target.classList.add('animate__animated');
        }

        function joinGame() {
            const name = document.getElementById('username').value;
            if(!name) return alert("名前を入力してください");
            socket.emit('join_game', name);
        }

        function startGame() {
            const diff = document.getElementById('difficulty').value;
            socket.emit('start_game', diff);
        }
        
        function forceReset() {
            if(confirm("本当にリセットしますか？")) socket.emit('force_reset');
        }

        // 次のゲームへ（誰かが押せば全員戻る）
        function nextGame() {
            socket.emit('trigger_next_game');
        }

        function copyUrl() {
            navigator.clipboard.writeText(window.location.href).then(() => alert("コピーしました！"));
        }

        socket.on('update_players', (players) => {
            const myName = document.getElementById('username').value;
            const amIJoined = players.some(p => p.name === myName);
            
            // ゲーム進行中でないならロビーへ
            if (document.getElementById('game-screen').classList.contains('hidden') && 
                document.getElementById('vote-screen').classList.contains('hidden') &&
                document.getElementById('result-screen').classList.contains('hidden') &&
                amIJoined) {
                showScreen('lobby-screen');
            }

            const ul = document.getElementById('players-ul');
            document.getElementById('player-count').textContent = players.length + "人参加中";
            ul.innerHTML = '';
            players.forEach((p, index) => {
                const li = document.createElement('li');
                const icon = icons[index % icons.length];
                li.innerHTML = `<span>${icon} ${p.name}</span>`;
                ul.appendChild(li);
            });
        });

        socket.on('game_started', (data) => {
            showScreen('game-screen');
            document.getElementById('word-display').textContent = data.word;
        });

        socket.on('show_voting_screen', (players) => {
            showScreen('vote-screen');
            const div = document.getElementById('vote-buttons');
            div.innerHTML = '';
            players.forEach((p, index) => {
                if(p.id === socket.id) return;
                const btn = document.createElement('button');
                btn.innerHTML = `${icons[index % icons.length]} <strong>${p.name}</strong> に投票`;
                btn.onclick = () => {
                    if(confirm(`${p.name} に投票しますか？`)) {
                        socket.emit('submit_vote', p.id);
                        showScreen('wait-vote-screen');
                    }
                };
                div.appendChild(btn);
            });
        });

        socket.on('game_result', (players) => {
            showScreen('result-screen');
            const ul = document.getElementById('result-list');
            ul.innerHTML = '';
            players.sort((a, b) => b.voteCount - a.voteCount);
            players.forEach(p => {
                let roleT = p.role === 'villager' ? '村人' : (p.role === 'wolf' ? '人狼' : '狐');
                let roleC = p.role === 'villager' ? 'role-villager' : (p.role === 'wolf' ? 'role-wolf' : 'role-fox');
                let li = document.createElement('li');
                li.innerHTML = `<div><strong>${p.name}</strong> (${p.voteCount}票)<br><span style="color:#bbb;font-size:0.8em">${p.word}</span></div><div class="${roleC}">${roleT}</div>`;
                ul.appendChild(li);
            });
        });

        socket.on('reset_game', () => {
            // リセットされたらログイン画面へ（名前入力しなおしでバグ防止）
            showScreen('login-screen');
            document.getElementById('username').value = '';
            alert("ロビーに戻ります");
        });

        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
