<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIワードウルフ</title>
    <style>
        /* 少しデザインをおしゃれにしました */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 10px; background-color: #f0f2f5; color: #333; }
        .hidden { display: none; }
        .box { 
            background: #fff; 
            padding: 20px; 
            margin: 10px auto; 
            max-width: 500px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin-bottom: 5px; font-size: 1.5em; color: #444; }
        h2 { font-size: 1.2em; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            margin-top: 10px; 
            transition: background 0.2s;
        }
        button:active { transform: scale(0.98); }
        button.secondary { background: #6c757d; }
        button.vote-btn { background: #dc3545; margin-bottom: 10px;}
        
        input, select { 
            width: 80%; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            margin-bottom: 15px;
        }

        #word-display { 
            font-size: 2.5em; 
            color: #d32f2f; 
            font-weight: bold; 
            margin: 30px 0; 
            padding: 20px;
            background: #fff0f0;
            border-radius: 10px;
            border: 2px dashed #ffcccc;
        }
        
        ul { padding: 0; list-style: none; }
        li { padding: 10px; border-bottom: 1px solid #eee; }
        .role-villager { color: #28a745; font-weight: bold; }
        .role-wolf { color: #dc3545; font-weight: bold; }
        .role-fox { color: #ffc107; font-weight: bold; text-shadow: 1px 1px 0 #999; }
    </style>
</head>
<body>
    <h1>🦊 AIワードウルフ 🐺</h1>

    <!-- 1. 名前入力 -->
    <div id="login-screen" class="box">
        <p>ニックネームを入力してください</p>
        <input type="text" id="username" placeholder="例：たなか" />
        <button onclick="joinGame()">部屋に入る</button>
    </div>

    <!-- 2. ロビー -->
    <div id="lobby-screen" class="box hidden">
        <h2>待機所</h2>
        <p>参加者リスト:</p>
        <ul id="players-ul"></ul>
        
        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
            <label for="difficulty">お題の難易度</label><br>
            <select id="difficulty">
                <option value="easy">🐣 かんたん（子供向け）</option>
                <option value="normal" selected>🙂 ふつう（一般）</option>
                <option value="hard">😈 むずかしい（抽象的）</option>
            </select>
            <button onclick="startGame()">ゲーム開始</button>
        </div>
    </div>

    <!-- 3. ゲーム画面 -->
    <div id="game-screen" class="box hidden">
        <h2>あなたのお題</h2>
        <p>周りの様子を探りながら会話しよう</p>
        <div id="word-display">???</div>
        <button class="secondary" onclick="socket.emit('start_voting')">議論を終了して投票へ</button>
    </div>

    <!-- 4. 投票画面 -->
    <div id="vote-screen" class="box hidden">
        <h2>投票タイム</h2>
        <p>人狼だと思う人を選んでください</p>
        <div id="vote-buttons"></div>
    </div>
    
    <!-- 5. 投票完了待ち -->
    <div id="wait-vote-screen" class="box hidden">
        <h2>投票完了</h2>
        <p>他の人の投票を待っています...</p>
        <p>⌛</p>
    </div>

    <!-- 6. 結果画面 -->
    <div id="result-screen" class="box hidden">
        <h2>結果発表！</h2>
        <ul id="result-list"></ul>
        <p style="font-size: 0.8em; color: #666;">※15秒後に自動でロビーに戻ります</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = '';

        function joinGame() {
            const name = document.getElementById('username').value;
            if(!name) return alert("名前を入力してください");
            socket.emit('join_game', name);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        }

        function startGame() {
            const diff = document.getElementById('difficulty').value;
            socket.emit('start_game', diff);
        }

        socket.on('update_players', (players) => {
            const ul = document.getElementById('players-ul');
            ul.innerHTML = '';
            players.forEach(p => {
                const li = document.createElement('li');
                li.textContent = "👤 " + p.name;
                ul.appendChild(li);
            });
        });

        socket.on('game_started', (data) => {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden'); // リセット戻り用
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('word-display').textContent = data.word;
        });

        socket.on('show_voting_screen', (players) => {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('vote-screen').classList.remove('hidden');
            const div = document.getElementById('vote-buttons');
            div.innerHTML = '';
            
            players.forEach(p => {
                if(p.id === socket.id) return; // 自分には投票不可
                const btn = document.createElement('button');
                btn.textContent = p.name + " に投票";
                btn.className = "vote-btn";
                btn.onclick = () => {
                    if(confirm(p.name + " に投票しますか？")) {
                        socket.emit('submit_vote', p.id);
                        document.getElementById('vote-screen').classList.add('hidden');
                        document.getElementById('wait-vote-screen').classList.remove('hidden');
                    }
                };
                div.appendChild(btn);
            });
        });

        socket.on('game_result', (players) => {
            document.getElementById('wait-vote-screen').classList.add('hidden');
            document.getElementById('vote-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const ul = document.getElementById('result-list');
            ul.innerHTML = '';
            
            // 得票数が多い順に並び替え（オプション）
            players.sort((a, b) => b.voteCount - a.voteCount);

            players.forEach(p => {
                let roleLabel = '';
                let roleClass = '';
                if(p.role === 'villager') { roleLabel = '村人'; roleClass = 'role-villager'; }
                else if(p.role === 'wolf') { roleLabel = '人狼'; roleClass = 'role-wolf'; }
                else { roleLabel = '狐'; roleClass = 'role-fox'; }

                let li = document.createElement('li');
                li.innerHTML = `
                    <strong>${p.name}</strong> : ${p.voteCount}票<br>
                    お題「${p.word}」 <span class="${roleClass}">(${roleLabel})</span>
                `;
                ul.appendChild(li);
            });
        });

        socket.on('reset_game', () => {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('wait-vote-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        });

        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
