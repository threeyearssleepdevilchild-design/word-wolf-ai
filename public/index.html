<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIワードウルフ</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root { --bg-color: #1a1a2e; --card-color: #16213e; --accent-color: #e94560; --text-color: #ecf0f1; }
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .box { background-color: var(--card-color); border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #0f3460; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background-color: var(--accent-color); color: white; }
        button.secondary { background-color: #95a5a6; }
        button.next-btn { background-color: #4CAF50; margin-top: 20px; font-size: 1.2rem; }
        button.copy-btn { background-color: #0f3460; margin-top: 5px; font-size: 0.9rem;}
        #word-card { background: linear-gradient(135deg, #0f3460, #16213e); padding: 30px; border-radius: 15px; margin: 20px 0; border: 2px dashed var(--accent-color); }
        #word-display { font-size: 2.5rem; font-weight: bold; color: #fff; }
        ul { padding: 0; list-style: none; }
        li { background: rgba(255,255,255,0.05); margin: 8px 0; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .role-wolf { color: #ff6b6b; } .role-fox { color: #feca57; } .role-villager { color: #1dd1a1; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 46, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(233, 69, 96, 0.3); border-top: 5px solid #e94560; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ゲーム中のプレイヤーリスト用スタイル */
        .game-player-list li { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
        .status-container { display: flex; gap: 10px; width: 100%; }
        .status-btn { 
            flex: 1; padding: 8px; margin: 0; font-size: 0.9rem; 
            background: #333; color: #aaa; border: 1px solid #555; 
            border-radius: 5px; transition: all 0.2s;
        }
        /* アクティブ時の色 */
        .status-btn.active-question { background: #e94560; color: white; border-color: #e94560; box-shadow: 0 0 10px rgba(233, 69, 96, 0.4); }
        .status-btn.active-answer { background: #4CAF50; color: white; border-color: #4CAF50; box-shadow: 0 0 10px rgba(76, 175, 80, 0.4); }

    </style>
</head>
<body>
    <h1 class="animate__animated animate__fadeInDown">🦊 AIワードウルフ 🐺</h1>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p>AIがお題を考えています...<br>🧠💭</p>
    </div>

    <!-- 1. 名前入力 -->
    <div id="login-screen" class="box animate__animated animate__fadeInUp">
        <p>ニックネームを入力して参加</p>
        <input type="text" id="username" placeholder="名前" />
        <button onclick="joinGame()">部屋に入る 🚪</button>
        <button style="background:none; color:#666; font-size:0.8em; margin-top:20px; text-decoration:underline;" onclick="if(confirm('リセットしますか？')) socket.emit('force_reset')">⚠️ 強制リセット</button>
    </div>

    <!-- 2. ロビー -->
    <div id="lobby-screen" class="box hidden animate__animated animate__fadeIn">
        <div style="display: flex; justify-content: space-between;"><h2>⛺ 待機所</h2><span id="player-count">0人</span></div>
        <button class="copy-btn" onclick="copyUrl()">🔗 URLをコピー</button>
        <ul id="players-ul"></ul>
        <div style="margin-top:20px; border-top:1px solid #444; padding-top:15px;">
            <label>お題のジャンル</label>
            <select id="difficulty">
                <option value="easy">🐣 かんたん</option>
                <option value="normal" selected>🙂 ふつう</option>
                <option value="hard">😈 むずかしい</option>
                <option value="sexy">🔞 セクシー</option>
            </select>
            <button onclick="startGame()">ゲーム開始 🎮</button>
        </div>
    </div>

    <!-- 3. ゲーム画面 -->
    <div id="game-screen" class="box hidden animate__animated animate__zoomIn">
        <h2>あなたのお題</h2>
        <div id="word-card"><div id="word-display">???</div></div>
        
        <p style="font-size:0.9em; color:#aaa; margin-bottom: 5px;">議論の進捗チェック</p>
        <!-- ★ここにプレイヤーリストを表示 -->
        <ul id="game-players-ul" class="game-player-list"></ul>

        <button class="secondary" onclick="socket.emit('start_voting')">✋ 議論終了・投票へ</button>
    </div>

    <!-- 4. 投票画面 -->
    <div id="vote-screen" class="box hidden animate__animated animate__fadeInRight">
        <h2 id="vote-title">👉 追放投票</h2>
        <p id="vote-desc">怪しい人を選んでください</p>
        <div id="vote-buttons"></div>
    </div>
    
    <!-- 5. 待機画面 -->
    <div id="wait-vote-screen" class="box hidden animate__animated animate__fadeIn">
        <h2 id="wait-title">🙏 祈り中...</h2>
        <div style="font-size: 3rem; margin: 20px;">⌛</div>
    </div>

    <!-- 6. 狐捕獲演出 -->
    <div id="fox-caught-screen" class="box hidden animate__animated animate__bounceIn">
        <h2 style="color:#feca57">🦊 キツネ確保！</h2>
        <p>追放されたのは <strong id="fox-victim-name">???</strong> でした。<br>正体はキツネです！</p>
        <hr>
        <p>まだ終わりません...<br><strong>次は「人狼」を探してください！</strong></p>
    </div>

    <!-- 7. 結果画面 -->
    <div id="result-screen" class="box hidden animate__animated animate__backInUp">
        <h2 id="winner-title">🏆 結果発表</h2>
        <p id="result-message"></p>
        <ul id="result-list"></ul>
        <button class="next-btn" onclick="nextGame()">🔄 同じメンバーで次へ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const icons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷'];

        function showScreen(id) {
            document.querySelectorAll('.box').forEach(el => el.classList.add('hidden'));
            const t = document.getElementById(id);
            t.classList.remove('hidden');
            t.classList.remove('animate__animated');
            void t.offsetWidth;
            t.classList.add('animate__animated');
        }

        function joinGame() {
            const name = document.getElementById('username').value;
            if(!name) return alert("名前を入力してください");
            socket.emit('join_game', name);
        }

        function startGame() { socket.emit('start_game', document.getElementById('difficulty').value); }
        function nextGame() { socket.emit('trigger_next_game'); }
        function copyUrl() { navigator.clipboard.writeText(window.location.href).then(() => alert("コピーしました")); }

        // --- イベント ---

        socket.on('update_players', (players) => {
            const myName = document.getElementById('username').value;
            if(myName && document.getElementById('login-screen').classList.contains('hidden') === false) {
                 showScreen('lobby-screen');
            }
            document.getElementById('player-count').textContent = players.length + "人";
            const ul = document.getElementById('players-ul');
            ul.innerHTML = '';
            players.forEach((p, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${icons[i%icons.length]} ${p.name}</span>`;
                ul.appendChild(li);
            });
        });

        // ★ゲーム中のプレイヤー状態更新（質問/回答ボタン）
        socket.on('update_game_status', (players) => {
            const ul = document.getElementById('game-players-ul');
            ul.innerHTML = '';
            
            players.forEach((p, i) => {
                const li = document.createElement('li');
                // 自分かどうかで表示を少し変える（オプション）
                const isMe = p.id === socket.id;
                
                // ボタンのクラス（押されていたら active-xxx をつける）
                const qClass = p.status.question ? 'active-question' : '';
                const aClass = p.status.answer ? 'active-answer' : '';

                li.innerHTML = `
                    <div style="font-weight:bold;">${icons[i%icons.length]} ${p.name}</div>
                    <div class="status-container">
                        <button class="status-btn ${qClass}" onclick="toggleStatus('${p.id}', 'question')">
                            🗣️ 質問${p.status.question ? '済' : ''}
                        </button>
                        <button class="status-btn ${aClass}" onclick="toggleStatus('${p.id}', 'answer')">
                            💬 回答${p.status.answer ? '済' : ''}
                        </button>
                    </div>
                `;
                ul.appendChild(li);
            });
        });

        // ステータス切り替え送信
        function toggleStatus(targetId, type) {
            socket.emit('toggle_action', { targetId, type });
        }

        socket.on('loading_start', () => { document.getElementById('loading-overlay').classList.remove('hidden'); });

        socket.on('game_started', (data) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            showScreen('game-screen');
            document.getElementById('word-display').textContent = data.word;
        });

        socket.on('show_voting_screen', (data) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            showScreen('vote-screen');
            const div = document.getElementById('vote-buttons');
            div.innerHTML = '';
            
            if (data.phase === 'FOX') {
                document.getElementById('vote-title').textContent = "🦊 1回戦：キツネ投票";
                document.getElementById('vote-desc').textContent = "会話が噛み合わない「キツネ」を探してください";
            } else {
                document.getElementById('vote-title').textContent = "🐺 2回戦：人狼投票";
                document.getElementById('vote-desc').textContent = "嘘をついている「人狼」を探してください！";
            }

            data.players.forEach((p, i) => {
                if(p.id === socket.id) return;
                const btn = document.createElement('button');
                btn.innerHTML = `${icons[i%icons.length]} <strong>${p.name}</strong> に投票`;
                btn.onclick = () => {
                    if(confirm(`${p.name} に投票しますか？`)) {
                        socket.emit('submit_vote', p.id);
                        showScreen('wait-vote-screen');
                        document.getElementById('wait-title').textContent = (data.phase==='FOX') ? "🦊 投票待ち..." : "🐺 投票待ち...";
                    }
                };
                div.appendChild(btn);
            });
        });

        socket.on('fox_caught', (data) => {
            showScreen('fox-caught-screen');
            document.getElementById('fox-victim-name').textContent = data.victimName;
        });

        socket.on('game_result', (data) => {
            showScreen('result-screen');
            const ul = document.getElementById('result-list');
            const title = document.getElementById('winner-title');
            const msg = document.getElementById('result-message');
            
            ul.innerHTML = '';
            if (data.winner === 'FOX') {
                title.textContent = "🦊 キツネの独り勝ち！";
                msg.textContent = `追放された ${data.victimName} はキツネではありませんでした。`;
                title.style.color = "#feca57";
            } else if (data.winner === 'VILLAGE') {
                title.textContent = "👱 村人の勝利！";
                msg.textContent = `人狼の ${data.victimName} を追放しました！`;
                title.style.color = "#1dd1a1";
            } else {
                title.textContent = "🐺 人狼の勝利！";
                msg.textContent = `追放された ${data.victimName} は人狼ではありませんでした。`;
                title.style.color = "#ff6b6b";
            }

            data.players.sort((a, b) => b.voteCount - a.voteCount);
            data.players.forEach(p => {
                let roleT = p.role === 'villager' ? '👱村人' : (p.role === 'wolf' ? '🐺人狼' : '🦊狐');
                let roleC = p.role === 'villager' ? 'role-villager' : (p.role === 'wolf' ? 'role-wolf' : 'role-fox');
                let li = document.createElement('li');
                li.innerHTML = `<div><strong>${p.name}</strong> (${p.voteCount}票)<br><span style="color:#aaa;font-size:0.8em">お題:${p.word}</span></div><div class="${roleC}">${roleT}</div>`;
                ul.appendChild(li);
            });
        });

        socket.on('reset_game', () => { showScreen('lobby-screen'); });
        socket.on('reset_to_login', () => { showScreen('login-screen'); document.getElementById('username').value = ''; });
        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
